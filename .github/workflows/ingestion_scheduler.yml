name: Automated Ingestion Scheduler

on:
  schedule:
    # 10:00 AM IST is 04:30 AM UTC
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write # Need permission to push the updated database back

jobs:
  run-ingestion:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # or whichever version is standard
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # If there are additional dependencies not in requirements.txt but used by scripts:
          pip install schedule pytz

      - name: Run Fetch Script
        run: python ingestion/fetch.py

      - name: Run Parse Script
        run: python ingestion/parse.py

      - name: Run Chunker Script
        run: python ingestion/chunker.py

      - name: Run Embed Script
        run: python ingestion/embed.py

      - name: Commit and Push updated Vector Database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated ingestion updates (ChromaDB + JSON)" && git push)
