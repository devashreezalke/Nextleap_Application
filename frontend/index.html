    <style>
        body {
            background-color: #f7f9fb;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .glass-header {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background-color: rgba(255, 255, 255, 0.7);
            border-bottom: 1px solid #e0e3e5;
        }

        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            height: calc(100vh - 180px);
            overflow-y: auto;
            scroll-behavior: smooth;
            padding: 24px;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .user-bubble {
            background-color: #f1f5f9;
            color: #191c1e;
            padding: 12px 18px;
            border-radius: 16px;
            margin-bottom: 24px;
            max-width: 85%;
            margin-left: auto;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
            font-size: 15px;
            line-height: 1.5;
        }

        .assistant-bubble {
            background-color: #ffffff;
            color: #191c1e;
            padding: 16px 20px;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            margin-bottom: 24px;
            max-width: 90%;
            margin-right: auto;
            box-shadow: 0 4px 20px rgba(30, 41, 59, 0.05);
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .suggestion-chip {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            color: #1e293b;
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .suggestion-chip:hover {
            border-color: #00d09c;
            color: #006c4f;
            background-color: rgba(0, 208, 156, 0.05);
            transform: translateY(-1px);
        }

        .input-bar-container {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            background-color: rgba(255, 255, 255, 0.8);
            border-top: 1px solid #e2e8f0;
            padding: 16px 24px;
            position: fixed;
            bottom: 32px;
            left: 0;
            right: 0;
            max-width: 800px;
            margin: 0 auto;
            border-radius: 16px;
            box-shadow: 0 -10px 25px rgba(0, 0, 0, 0.03);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 50;
        }

        .primary-btn {
            background-color: #00d09c;
            color: white;
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .primary-btn:hover {
            background-color: #00be8e;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 208, 156, 0.3);
        }

        .primary-btn:active {
            transform: scale(0.98);
        }

        .disclaimer-banner {
            background-color: #002116;
            color: #59fdc5;
            text-align: center;
            padding: 8px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .dot-pulse {
            position: relative;
            left: -9999px;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: #00d09c;
            color: #00d09c;
            box-shadow: 9999px 0 0 0 #00d09c;
            animation: dot-pulse 1.5s infinite linear;
        }

        @keyframes dot-pulse {
            0% {
                box-shadow: 9999px 0 0 -5px #00d09c;
            }

            30% {
                box-shadow: 9999px 0 0 2px #00d09c;
            }

            60%,
            100% {
                box-shadow: 9999px 0 0 -5px #00d09c;
            }
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 24px;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>

                <h1 class="font-headline-lg text-primary tracking-tight">HDFC FundBot</h1>
            </div>
            <div class="flex items-center gap-md">
                <span
                    class="material-symbols-outlined text-secondary cursor-pointer hover:text-primary transition-colors">account_circle</span>
                <span
                    class="material-symbols-outlined text-secondary cursor-pointer hover:text-primary transition-colors">settings</span>
            </div>
        </div>
    </header>
    <!-- Main Content Area -->
    <main class="flex-grow relative pt-md pb-xl">
        <div class="chat-container" id="chatWindow">
            <!-- Welcome Message -->
            <div class="assistant-bubble">
                <span class="font-bold block mb-1">Hello! I'm your HDFC Mutual Fund Assistant.</span>
                I can provide factual information about schemes, exit loads, expense ratios, and NAVs. How can I help
                you today?
            </div>
            <!-- Suggestion Chips -->
            <div class="flex flex-wrap gap-xs mb-md max-w-[800px] mx-auto px-xs" id="chipsContainer">
                <button class="suggestion-chip"
                    onclick="handleChipClick('What is the exit load for the Defence Fund?')">What is the exit load for
                    the Defence Fund?</button>
                <button class="suggestion-chip"
                    onclick="handleChipClick('What is the expense ratio of the Mid Cap fund?')">What is the expense
                    ratio of the Mid Cap fund?</button>
                <button class="suggestion-chip"
                    onclick="handleChipClick('What is the minimum SIP amount for the Gold ETF?')">What is the minimum
                    SIP amount for the Gold ETF?</button>
            </div>
            <!-- Chat messages injected here -->
            <div id="messageAnchor"></div>
        </div>
        <!-- Input Bar Section -->
        <div class="input-bar-container">
            <input autocomplete="off"
                class="flex-grow bg-transparent border-none focus:ring-0 text-on-surface font-body-lg" id="queryInput"
                placeholder="Ask about fund facts..." type="text" />
            <button class="primary-btn" id="sendBtn">
                <span>Send</span>
                <span class="material-symbols-outlined text-[20px]">send</span>
            </button>
        </div>
    </main>
    <!-- Footer Disclaimer -->
    <footer class="disclaimer-banner">
        Facts-only. No investment advice. © HDFC Mutual Funds
    </footer>
    <script>
        const chatWindow = document.getElementById('chatWindow');
        const queryInput = document.getElementById('queryInput');
        const sendBtn = document.getElementById('sendBtn');
        const messageAnchor = document.getElementById('messageAnchor');
        const chipsContainer = document.getElementById('chipsContainer');

        function scrollToBottom() {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendMessage(text, isUser = false) {
            const bubble = document.createElement('div');
            bubble.className = isUser ? 'user-bubble' : 'assistant-bubble';
            bubble.textContent = text;
            messageAnchor.parentNode.insertBefore(bubble, messageAnchor);
            scrollToBottom();
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.id = 'typingIndicator';
            indicator.className = 'assistant-bubble w-fit flex items-center gap-md';
            indicator.innerHTML = `
                <div class="typing-indicator">
                    <div class="dot-pulse"></div>
                </div>
            `;
            messageAnchor.parentNode.insertBefore(indicator, messageAnchor);
            scrollToBottom();
            return indicator;
        }

        async function submitQuery(query) {
            if (!query.trim()) return;

            // Clear input
            queryInput.value = '';

            // Render user message
            appendMessage(query, true);

            // Hide chips once user starts chatting
            if (chipsContainer) {
                chipsContainer.classList.add('opacity-50', 'pointer-events-none');
            }

            // Show typing
            const indicator = showTypingIndicator();

            try {
                const response = await fetch('http://growwaiassistant.up.railway.app', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });

                if (!response.ok) throw new Error('API Error');

                const data = await response.json();

                // Remove typing
                indicator.remove();

                // Render answer
                appendMessage(data.answer || "I'm sorry, I couldn't fetch that information right now.");

            } catch (error) {
                console.error(error);
                indicator.remove();
                appendMessage("I am currently unable to connect to the factual database. Please try again in a few moments.");
            }
        }

        function handleChipClick(text) {
            submitQuery(text);
        }

        sendBtn.addEventListener('click', () => {
            submitQuery(queryInput.value);
        });

        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitQuery(queryInput.value);
            }
        });

        // Initialize empty state focus
        window.onload = () => {
            queryInput.focus();
        };
    </script>
</body>

</html>
